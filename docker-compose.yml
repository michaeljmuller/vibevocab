services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibevocab}
      POSTGRES_USER: ${POSTGRES_USER:-vibevocab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibevocab}
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibevocab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vibevocab}
      DB_USER: ${POSTGRES_USER:-vibevocab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vibevocab}
      APP_USER_EMAIL: ${APP_USER_EMAIL:-admin@example.com}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      SUGGESTION_COUNT: ${SUGGESTION_COUNT:-3}
      LLM_SUGGESTION_PROMPT: ${LLM_SUGGESTION_PROMPT:-/prompts/example-sentences.txt}
      LLM_TRANSLATION_PROMPT: ${LLM_TRANSLATION_PROMPT:-/prompts/translate-example.txt}
      TTS_PROVIDER: ${TTS_PROVIDER:-elevenlabs}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      TTS_VOICE_ID: ${TTS_VOICE_ID:-}
      TTS_MODEL: ${TTS_MODEL:-eleven_multilingual_v2}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      TTS_STABILITY: ${TTS_STABILITY:-0.48}
      TTS_SIMILARITY: ${TTS_SIMILARITY:-0.75}
      TTS_STYLE: ${TTS_STYLE:-0.08}
      TTS_SPEAKER_BOOST: ${TTS_SPEAKER_BOOST:-true}
      CARD_FLIP_INTER_AUDIO_PAUSE_MS: ${CARD_FLIP_INTER_AUDIO_PAUSE_MS:-1500}
    volumes:
      - ./web:/app
      - ./prompts:/prompts:ro
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy

  backup:
    image: postgres:16
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-vibevocab}
      PGUSER: ${POSTGRES_USER:-vibevocab}
      PGDATABASE: ${POSTGRES_DB:-vibevocab}
      BACKUP_INACTIVITY_MINUTES: ${BACKUP_INACTIVITY_MINUTES:-15}
      BACKUP_POLL_SECONDS: ${BACKUP_POLL_SECONDS:-60}
    volumes:
      - ./backups:/backups
      - ./backup/watcher.sh:/watcher.sh:ro
    depends_on:
      db:
        condition: service_healthy
    command: bash -c "apt-get update -qq && apt-get install -y -qq curl && bash /watcher.sh"
    restart: unless-stopped

  ingest:
    build: ./ingest
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vibevocab}
      DB_USER: ${POSTGRES_USER:-vibevocab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vibevocab}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      CSV_PATH: /data/pt-PT-lexicon.csv
    volumes:
      - ./pt-PT-lexicon.csv:/data/pt-PT-lexicon.csv:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - ingest

volumes:
  pgdata:
